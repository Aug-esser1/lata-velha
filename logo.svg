<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Top arc: clockwise, topo do círculo -->
    <path id="topArc" d="M 26,100 A 74,74 0 0,1 174,100"/>
    <!-- Bottom arc: counterclockwise, base do círculo -->
    <path id="bottomArc" d="M 26,100 A 74,74 0 0,0 174,100"/>
  </defs>

  <!-- Fundo preto circular -->
  <circle cx="100" cy="100" r="98" fill="#060606"/>

  <!-- Anel externo com brilho ciano -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#a8e8f4" stroke-width="1.5" filter="url(#glow)" opacity="0.9"/>
  <circle cx="100" cy="100" r="94" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.6"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#6ccfdf" stroke-width="7"/>
  <circle cx="100" cy="100" r="87" fill="none" stroke="#3aabbf" stroke-width="1.2"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="#1a8090" stroke-width="0.5"/>

  <!-- Círculo interno preto -->
  <circle cx="100" cy="100" r="83" fill="#060606"/>

  <!-- Divisores decorativos no anel (bolinhas) -->
  <circle cx="100" cy="17" r="2.5" fill="#6ccfdf"/>
  <circle cx="100" cy="183" r="2.5" fill="#6ccfdf"/>

  <!-- SINCE 2012 — topo em arco -->
  <text fill="white" font-size="10" font-family="Arial, Helvetica, sans-serif"
        font-weight="700" letter-spacing="4">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">SINCE 2012</textPath>
  </text>

  <!-- LATA — linha 1 -->
  <text x="100" y="96" fill="white" font-size="42" font-weight="900"
        font-family="Impact, 'Arial Black', Arial, sans-serif"
        text-anchor="middle" letter-spacing="1">LATA</text>

  <!-- VELHA — linha 2 -->
  <text x="100" y="136" fill="white" font-size="42" font-weight="900"
        font-family="Impact, 'Arial Black', Arial, sans-serif"
        text-anchor="middle" letter-spacing="1">VELHA</text>

  <!-- ROCK & BAR — base em arco -->
  <text fill="white" font-size="10" font-family="Arial, Helvetica, sans-serif"
        font-weight="700" letter-spacing="3.5">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">ROCK &amp; BAR</textPath>
  </text>
</svg>
